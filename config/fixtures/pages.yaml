          <li>Fournir des informations exactes lors de l'inscription</li>
          <li>Maintenir la confidentialité de ses identifiants de connexion</li>
          <li>Ne pas utiliser le service à des fins commerciales ou illicites</li>
          <li>Ne pas tenter de porter atteinte à la sécurité ou au bon fonctionnement du service</li>
        </ul>

        <h3>5. Avertissement médical</h3>
        <p>Les exercices de respiration proposés sont fournis à titre informatif et pédagogique uniquement.
        Ils ne constituent pas des conseils médicaux et ne sauraient remplacer l'avis d'un professionnel de santé.
        En cas de problème de santé, consultez un médecin avant de pratiquer ces exercices.</p>

        <h3>6. Suspension et suppression de compte</h3>
        <p>L'équipe CesiZen se réserve le droit de suspendre ou supprimer tout compte en cas de non-respect des présentes CGU.
        L'utilisateur peut à tout moment supprimer son compte depuis son espace personnel, entraînant la suppression définitive de toutes ses données.</p>

        <h3>7. Modification des CGU</h3>
        <p>CesiZen se réserve le droit de modifier les présentes CGU à tout moment. Les utilisateurs seront informés de toute modification significative.
        La poursuite de l'utilisation du service après notification vaut acceptation des nouvelles CGU.</p>

        <h3>8. Droit applicable</h3>
        <p>Les présentes CGU sont soumises au droit français. Tout litige relatif à leur interprétation ou exécution relève de la compétence des tribunaux français.</p>
