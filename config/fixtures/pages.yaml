        <h3>Hébergement</h3>
        <p>Ce site est hébergé dans le cadre d'un environnement de développement local sécurisé.</p>

        <h3>Propriété intellectuelle</h3>
        <p>L'ensemble des contenus présents sur ce site (textes, images, logos) sont la propriété exclusive de CesiZen ou de leurs auteurs respectifs.
        Toute reproduction, représentation ou diffusion, totale ou partielle, sans autorisation écrite préalable est interdite.</p>

        <h3>Responsabilité</h3>
        <p>Les informations et exercices proposés sur CesiZen sont fournis à titre informatif et pédagogique uniquement.
        Ils ne constituent pas des conseils médicaux et ne sauraient remplacer une consultation auprès d'un professionnel de santé.</p>

    - title: "Politique de confidentialité"
      category: "legal"
      isPublished: true
      content: >
        <h2>Politique de confidentialité</h2>
        <p>Dernière mise à jour : mars 2026</p>

        <h3>1. Responsable du traitement</h3>
        <p>Le responsable du traitement des données personnelles collectées sur CesiZen est l'équipe pédagogique du projet CesiZen (CESI).<br>
        Contact : <a href="mailto:cesizen@noreply.com">cesizen@noreply.com</a></p>

        <h3>2. Données collectées</h3>
        <p>Lors de la création de votre compte, nous collectons les données suivantes :</p>
        <ul>
          <li><strong>Adresse e-mail</strong> — identifiant de connexion et communication</li>
          <li><strong>Nom d'utilisateur</strong> — affichage dans l'interface</li>
          <li><strong>Date de naissance</strong> — vérification de l'âge minimum requis</li>
          <li><strong>Mot de passe</strong> — stocké sous forme hachée (Argon2id), jamais en clair</li>
          <li><strong>Date d'inscription et dernière connexion</strong> — gestion du compte</li>
        </ul>
        <p>Aucune donnée de navigation, cookie publicitaire ou traceur tiers n'est collecté.</p>

        <h3>3. Finalités et base légale</h3>
        <table>
          <thead><tr><th>Finalité</th><th>Base légale</th></tr></thead>
          <tbody>
            <tr><td>Création et gestion du compte utilisateur</td><td>Exécution du contrat (CGU acceptées)</td></tr>
            <tr><td>Authentification et sécurité</td><td>Intérêt légitime</td></tr>
            <tr><td>Envoi d'e-mails transactionnels (réinitialisation mot de passe)</td><td>Exécution du contrat</td></tr>
          </tbody>
        </table>

        <h3>4. Durée de conservation</h3>
        <ul>
          <li>Données de compte : conservées tant que le compte est actif, et supprimées automatiquement après <strong>3 ans d'inactivité</strong> (absence de connexion)</li>
          <li>Tokens de réinitialisation de mot de passe : supprimés automatiquement à expiration (1 heure)</li>
          <li>En cas de suppression du compte : toutes les données personnelles sont supprimées immédiatement et définitivement</li>
        </ul>

        <h3>5. Destinataires des données</h3>
        <p>Vos données ne sont transmises à aucun tiers. Elles sont accessibles uniquement aux administrateurs du service dans le cadre de la gestion technique du projet.</p>

        <h3>6. Vos droits</h3>
        <p>Conformément au Règlement Général sur la Protection des Données (RGPD — Règlement UE 2016/679), vous disposez des droits suivants :</p>
        <ul>
          <li><strong>Droit d'accès</strong> (art. 15) — consulter vos données depuis votre espace « Mon compte »</li>
          <li><strong>Droit de rectification</strong> (art. 16) — modifier vos données depuis « Mon compte »</li>
          <li><strong>Droit à l'effacement</strong> (art. 17) — supprimer définitivement votre compte et toutes vos données depuis « Mon compte » &gt; « Supprimer mon compte »</li>
          <li><strong>Droit à la portabilité</strong> (art. 20) — télécharger vos données au format JSON depuis « Mon compte » &gt; « Télécharger mes données »</li>
          <li><strong>Droit d'opposition</strong> (art. 21) — vous pouvez vous opposer à tout traitement en supprimant votre compte</li>
        </ul>

        <h3>7. Exercer vos droits</h3>
        <p>Pour exercer vos droits ou pour toute question relative à vos données personnelles, contactez-nous à :
        <a href="mailto:cesizen@noreply.com">cesizen@noreply.com</a></p>

        <h3>8. Droit de plainte</h3>
        <p>Si vous estimez que le traitement de vos données personnelles n'est pas conforme à la réglementation, vous avez le droit d'introduire une réclamation auprès de la
        <a href="https://www.cnil.fr" target="_blank" rel="noopener noreferrer">CNIL</a> (Commission Nationale de l'Informatique et des Libertés).</p>

