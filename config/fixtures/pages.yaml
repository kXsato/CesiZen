        <h2>Conditions Générales d'Utilisation</h2>
        <p>Dernière mise à jour : mars 2026</p>

        <h3>1. Objet</h3>
        <p>Les présentes Conditions Générales d'Utilisation (CGU) régissent l'accès et l'utilisation du service CesiZen,
        plateforme de bien-être numérique proposant des exercices de respiration guidés.</p>

        <h3>2. Acceptation</h3>
        <p>L'utilisation du service implique l'acceptation pleine et entière des présentes CGU.
        En créant un compte, vous confirmez avoir lu et accepté ces conditions ainsi que notre
        <a href="/legal/politique-de-confidentialite">politique de confidentialité</a>.</p>

        <h3>3. Accès au service</h3>
        <p>Le service est accessible à toute personne physique majeure disposant d'une connexion internet.
        Un compte est nécessaire pour accéder aux fonctionnalités personnalisées.</p>

        <h3>4. Responsabilité de l'utilisateur</h3>
        <p>L'utilisateur s'engage à :</p>
