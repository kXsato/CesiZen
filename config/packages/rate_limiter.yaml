framework:
    rate_limiter:
        # 5 tentatives de connexion par tranche de 15 minutes (par IP)
        login:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'

        # 3 inscriptions par heure (par IP)
        register:
            policy: fixed_window
            limit: 3
            interval: '1 hour'

        # 3 demandes de réinitialisation par heure (par IP)
        reset_password:
            policy: fixed_window
            limit: 3
            interval: '1 hour'
